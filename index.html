<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>LINE 下單確認</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      text-align: center;
    }
    .box {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 20px;
      margin-top: 20px;
    }
    button {
      margin-top: 20px;
      padding: 15px 25px;
      font-size: 18px;
      background: #06C755;
      color: white;
      border: none;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<h2>確認訂單</h2>

<div class="box" id="orderInfo"></div>

<button onclick="sendOrder()">確認送出到LINE</button>

<script>
  const LIFF_ID = "2009856088-Y1C8kWVp";

  function getParams() {
    const params = new URLSearchParams(window.location.search);
    return {
      item: params.get("item") || "",
      color: params.get("color") || "",
      size: params.get("size") || "",
      qty: params.get("qty") || ""
    };
  }

  const data = getParams();

  document.getElementById("orderInfo").innerHTML = `
    商品：${data.item}<br>
    顏色：${data.color}<br>
    尺寸：${data.size}<br>
    數量：${data.qty}
  `;

  async function init() {
    await liff.init({ liffId: LIFF_ID });

    if (!liff.isLoggedIn()) {
      liff.login();
    }
  }

  async function sendOrder() {
    const text = `訂單\n商品:${data.item}\n顏色:${data.color}\n尺寸:${data.size}\n數量:${data.qty}`;

    if (!liff.isInClient()) {
      alert("請在LINE內開啟");
      return;
    }

    try {
      await liff.sendMessages([
        {
          type: "text",
          text: text
        }
      ]);
      alert("已送出！");
      liff.closeWindow();
    } catch (err) {
      alert("發送失敗");
      console.error(err);
    }
  }

  init();
</script>

</body>
</html>
