<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>LINE 下單確認</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      text-align: center;
    }
    .box {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 20px;
      margin-top: 20px;
    }
    button {
      margin-top: 20px;
      padding: 15px 25px;
      font-size: 18px;
      background: #06C755;
      color: white;
      border: none;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<h2>確認訂單</h2>

<div class="box" id="orderInfo"></div>

<button onclick="sendOrder()">前往LINE送出訂單</button>

<script>
  const LINE_OA_ID = "@344mwpgw"; // ← 改成你的官方帳ID

  function getParams() {
    const params = new URLSearchParams(window.location.search);
    return {
      item: params.get("item") || "",
      color: params.get("color") || "",
      size: params.get("size") || "",
      qty: params.get("qty") || "",
      fbname: params.get("fbname") || ""
    };
  }

  const data = getParams();

  document.getElementById("orderInfo").innerHTML = `
    商品：${data.item}<br>
    顏色：${data.color}<br>
    尺寸：${data.size}<br>
    數量：${data.qty}
  `;

  function sendOrder() {
    const message = 
`訂單
FB:${data.fbname}
商品:${data.item}
顏色:${data.color}
尺寸:${data.size}
數量:${data.qty}`;

    const encoded = encodeURIComponent(message);

    const url = `https://line.me/R/oaMessage/${LINE_OA_ID}/?${encoded}`;

    // 直接開啟官方LINE聊天室 + 帶訊息
    window.location.href = url;
  }
</script>

</body>
</html>
