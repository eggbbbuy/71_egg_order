<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>71_egg 訂單確認</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial, sans-serif;
  padding: 20px;
  text-align: center;
}

.box {
  border: 1px solid #ddd;
  border-radius: 10px;
  padding: 20px;
  margin-top: 20px;
  text-align: left;
}

input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  box-sizing: border-box;
}

button {
  margin-top: 20px;
  padding: 15px;
  font-size: 16px;
  background: #06C755;
  color: white;
  border: none;
  border-radius: 8px;
  width: 100%;
}
</style>
</head>

<body>

<h2>訂單確認</h2>

<div class="box">
  商品名稱
  <input id="item" placeholder="例如：LACOSTE 短袖T恤">

  FB名稱
  <input id="fbname" placeholder="例如：王小明">

  明細（顏色 / 尺寸 / 數量 / 多商品都可寫）
  <input id="detail" placeholder="例如：紅色L+1 黑色L+1">
</div>

<button onclick="gen()">前往71_egg官方LINE送出訂單</button>

<div class="box" id="result" style="margin-top:20px; word-break:break-all;"></div>

<script>

const LINE_OA_ID = "@344mwpgw";

function getParams() {
  const params = new URLSearchParams(window.location.search);
  return {
    item: params.get("item") || "",
    fbname: params.get("fbname") || "",
    detail: params.get("detail") || ""
  };
}

const data = getParams();

// 如果網址有帶參數就自動填入（可選）
document.getElementById("item").value = data.item;
document.getElementById("fbname").value = data.fbname;
document.getElementById("detail").value = data.detail;

function gen() {
  const item = document.getElementById("item").value;
  const fbname = document.getElementById("fbname").value;
  const detail = document.getElementById("detail").value;

  const url = `https://eggbbbuy.github.io/71_egg_order/?item=${encodeURIComponent(item)}&fbname=${encodeURIComponent(fbname)}&detail=${encodeURIComponent(detail)}`;

  const message =
`訂單
FB:${fbname}
商品:${item}
明細:
${detail}`;

  const encoded = encodeURIComponent(message);

  const lineUrl = `https://line.me/R/oaMessage/${LINE_OA_ID}/${encoded}`;

  document.getElementById("result").innerHTML = `
    <p><b>產生的連結：</b></p>
    <div>${url}</div>
    <br>
    <button onclick="navigator.clipboard.writeText('${url}')">複製訂單連結</button>
    <br><br>
    <button onclick="window.location.href='${lineUrl}'">測試跳LINE</button>
  `;
}

</script>

</body>
</html>
