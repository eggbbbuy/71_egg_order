<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>71_egg 訂單確認</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial, sans-serif;
  padding: 20px;
  text-align: center;
}

.box {
  border: 1px solid #ddd;
  border-radius: 10px;
  padding: 20px;
  margin-top: 20px;
  text-align: left;
}

input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  box-sizing: border-box;
}

button {
  margin-top: 20px;
  padding: 15px;
  font-size: 16px;
  background: #06C755;
  color: white;
  border: none;
  border-radius: 8px;
  width: 100%;
}
</style>
</head>

<body>

<h2>訂單確認</h2>

<div class="box">
  商品名稱
  <input id="item" placeholder="例如：BEAMS JAPAN 重磅紅繩短袖T恤">

  單價
  <input id="price" placeholder="0">

  明細（顏色 / 尺寸 / 數量 / 多商品都可寫）
  <input id="detail" placeholder="例如：炭灰色L+1 黑色L+1">
</div>

<button onclick="gen()">前往71_egg官方LINE送出訂單</button>

<script>

const LINE_OA_ID = "@344mwpgw";

function gen() {
  const item = document.getElementById("item").value;
  const price = document.getElementById("price").value;
  const detail = document.getElementById("detail").value;

  const message =
`訂單
商品:${item}
單價:${price}
明細:
${detail}`;

  const encoded = encodeURIComponent(message);

  const lineUrl = `https://line.me/R/oaMessage/${LINE_OA_ID}/${encoded}`;

  // 直接跳轉 LINE
  window.location.href = lineUrl;
}

</script>

</body>
</html>
