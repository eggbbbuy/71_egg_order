<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>LINE 下單確認</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      text-align: center;
    }
    .box {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 20px;
      margin-top: 20px;
      text-align: left;
    }
    button {
      margin-top: 20px;
      padding: 15px 25px;
      font-size: 18px;
      background: #06C755;
      color: white;
      border: none;
      border-radius: 8px;
    }
    .debug {
      margin-top: 10px;
      font-size: 12px;
      color: gray;
    }
  </style>
</head>
<body>

<h2>確認訂單</h2>

<div class="box" id="orderInfo"></div>

<div class="debug" id="debug"></div>

<button onclick="sendOrder()">前往LINE送出訂單</button>

<script>
  const LINE_OA_ID = "@344mwpgw";

  function getParams() {
    const params = new URLSearchParams(window.location.search);

    return {
      item: params.get("item"),
      color: params.get("color"),
      size: params.get("size"),
      qty: params.get("qty"),
      fbname: params.get("fbname")
    };
  }

  const data = getParams();

  // 🔥 debug（超重要）
  document.getElementById("debug").innerText =
    "DEBUG URL: " + window.location.href;

  document.getElementById("orderInfo").innerHTML = `
    商品：${data.item || "❌ 沒有"}<br>
    顏色：${data.color || "❌ 沒有"}<br>
    尺寸：${data.size || "❌ 沒有"}<br>
    數量：${data.qty || "❌ 沒有"}<br>
    FB：${data.fbname || "❌ 沒有"}
  `;

  function sendOrder() {

    if (!data.item) {
      alert("❌ 沒有讀到參數，請檢查網址");
      return;
    }

    const message =
`訂單
FB:${data.fbname || ""}
商品:${data.item || ""}
顏色:${data.color || ""}
尺寸:${data.size || ""}
數量:${data.qty || ""}`;

    const encoded = encodeURIComponent(message);

    // ✔ 正確 LINE OA message 格式
    const url = `https://line.me/R/oaMessage/${LINE_OA_ID}/${encoded}`;

    window.location.href = url;
  }
</script>

</body>
</html>
